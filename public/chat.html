<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; media-src 'self' blob:; frame-src 'none'; object-src 'none';"/>
  <meta name="description" content="Chat with AI about your notes. Multiple modes: exam focus, deep dive, simple, memory."/>
  <meta property="og:title" content="StudyAI — AI Chat"/>
  <meta property="og:description" content="Chat with AI about your notes. Multiple modes: exam focus, deep dive, simple, memory."/>
  <meta property="og:type" content="website"/>
  <meta name="theme-color" content="#667eea"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>StudyAI — AI Chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>"/>
  <link rel="stylesheet" href="assets/css/global.css"/>
  <link rel="stylesheet" href="assets/css/components.css"/>
  <style>
    .chat-layout{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - var(--topbar-h));overflow:hidden}
    .chat-sidebar{background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .chat-sidebar-head{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .chat-sidebar-title{font-family:var(--font-display);font-size:.88rem;font-weight:700}
    .sessions-list{flex:1;overflow-y:auto;padding:8px}
    .session-item{padding:10px 12px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:all .15s;margin-bottom:3px}
    .session-item:hover{background:rgba(124,58,237,.06)}
    .session-item.active{background:linear-gradient(135deg,rgba(107,124,94,.1),rgba(163,177,138,.08));border-color:var(--border)}
    .session-title{font-size:.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .session-meta{font-size:.68rem;color:var(--text-muted);margin-top:3px}
    .chat-main{display:flex;flex-direction:column;overflow:hidden}
    .chat-toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
    .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
    .msg-row{display:flex;gap:10px;max-width:85%}
    .msg-ai{align-self:flex-start}
    .msg-user{align-self:flex-end;flex-direction:row-reverse}
    .msg-avatar{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.88rem;flex-shrink:0}
    .av-ai{background:var(--grad-1)}.av-user{background:var(--grad-2)}
    .msg-content{flex:1;min-width:0}
    .msg-bubble{padding:11px 15px;border-radius:14px;font-size:.86rem;line-height:1.7}
    .bubble-ai{background:rgba(255,255,255,.06);border:1px solid rgba(180,160,210,.14);border-top-left-radius:4px}
    .bubble-user{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(249,168,212,.12));border:1px solid rgba(192,132,252,.18);border-top-right-radius:4px}
    .msg-time{font-size:.65rem;color:var(--text-muted);margin-top:4px;padding:0 4px}
    .typing-dots{display:flex;gap:4px;padding:4px 2px;align-items:center}
    .typing-dot{width:6px;height:6px;border-radius:50%;background:var(--purple);animation:tdot 1.4s infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes tdot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
    .chat-suggestions{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px 0}
    .suggestion-chip{padding:5px 12px;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.15);border-radius:100px;font-size:.74rem;cursor:pointer;color:var(--purple);transition:all .15s;white-space:nowrap}
    .suggestion-chip:hover{background:rgba(124,58,237,.15);transform:translateY(-1px)}
    .chat-input-area{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
    .chat-input-box{display:flex;gap:9px;align-items:flex-end;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:9px 12px;transition:border-color .18s}
    .chat-input-box:focus-within{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
    #chat-input{flex:1;resize:none;background:transparent;border:none;color:var(--text);font-family:var(--font);font-size:.88rem;line-height:1.5;max-height:120px;overflow-y:auto;outline:none}
    #chat-input::placeholder{color:var(--text-muted)}
    .mode-select{background:rgba(255,255,255,.5);border:1px solid rgba(107,124,94,.15);border-radius:8px;color:var(--text);font-size:.78rem;padding:5px 9px;cursor:pointer;outline:none}
    .ctx-badge{padding:4px 10px;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.15);border-radius:100px;font-size:.72rem;color:var(--purple);white-space:nowrap}
    @keyframes voicePulse{0%,100%{box-shadow:0 0 0 0 rgba(245,87,108,.4)}50%{box-shadow:0 0 0 8px rgba(245,87,108,0)}}
    #voice-btn.recording{background:rgba(245,87,108,.2)!important;border-color:var(--red)!important;color:var(--red)!important;animation:voicePulse 1s infinite}
    @media(max-width:768px){.chat-layout{grid-template-columns:1fr}.chat-sidebar{display:none}}
  </style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="chat-layout">

      <div class="chat-sidebar">
        <div class="chat-sidebar-head">
          <span class="chat-sidebar-title">💬 History</span>
          <!-- ✅ No inline onclick -->
          <button class="btn btn-primary btn-sm" id="btn-new-chat">+ New</button>
        </div>
        <div class="sessions-list" id="sessions-list">
          <div class="text-xs text-muted" style="padding:12px">No sessions yet.</div>
        </div>
      </div>

      <div class="chat-main">
        <div class="chat-toolbar">
          <span class="ctx-badge">📝 <span id="notes-count">0</span> notes loaded</span>
          <!-- ✅ No inline onchange -->
          <select class="mode-select" id="chat-mode">
            <option value="general">🧠 General</option>
            <option value="exam">📋 Exam Focus</option>
            <option value="simple">💬 Simple Mode</option>
            <option value="deep">🔬 Deep Dive</option>
            <option value="memory">🧠 Memory Mode</option>
          </select>
          <div style="margin-left:auto;display:flex;gap:8px">
            <!-- ✅ No inline onclick -->
            <button id="tts-btn" style="padding:5px 12px;border-radius:8px;font-size:.76rem;font-weight:600;background:rgba(67,233,123,.08);border:1px solid rgba(67,233,123,.2);color:#43e97b;cursor:pointer;transition:all .18s">🔊 Voice Off</button>
            <button class="btn btn-secondary btn-sm" id="btn-chat-upload">🧠 AI Read File</button>
            <button class="btn btn-secondary btn-sm" id="btn-clear-chat">🗑️ Clear</button>
            <button class="btn btn-secondary btn-sm" id="btn-export-chat">📤 Export</button>
          </div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-suggestions" id="chat-suggestions"></div>

        <div class="chat-input-area">
          <div class="chat-input-box">
            <!-- ✅ No inline onkeydown/oninput -->
            <textarea id="chat-input" rows="1" placeholder="Ask anything from your notes…"></textarea>
            <button id="voice-btn" style="width:36px;height:36px;border-radius:10px;flex-shrink:0;background:rgba(102,126,234,.12);border:1px solid rgba(102,126,234,.25);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;font-size:1rem;color:#a78bfa">🎤</button>
            <button class="btn btn-primary btn-sm" id="btn-send" style="flex-shrink:0">Send ↗</button>
          </div>
          <div style="margin-top:6px;font-size:.68rem;color:var(--text-muted);text-align:center">
            Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/smart-upload.js"></script>
<script src="assets/js/chat.js"></script>
<script src="assets/js/events.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // ✅ All events wired in JS — zero inline handlers
    document.getElementById('btn-new-chat')?.addEventListener('click', newChat);
    document.getElementById('btn-send')?.addEventListener('click', sendMessage);
    document.getElementById('voice-btn')?.addEventListener('click', startVoice);
    document.getElementById('tts-btn')?.addEventListener('click', toggleTTS);
    document.getElementById('btn-clear-chat')?.addEventListener('click', clearChat);
    document.getElementById('btn-export-chat')?.addEventListener('click', exportChat);
    document.getElementById('chat-mode')?.addEventListener('change', updateMode);

    document.getElementById('btn-chat-upload')?.addEventListener('click', () =>
      openSmartUpload({ pageHint:'chat', onSuccess: r => {
        CS.notes = [...(CS.notes||[]), r.note];
        const el = document.getElementById('notes-count');
        if (el) el.textContent = CS.notes.length;
        const i = document.getElementById('chat-input');
        if (i) { i.value = `Analyse and explain: '${r.title}'`; autoResize(i); i.focus(); }
        showToast(r.title + ' loaded!', 'success', 4000);
      }})
    );

    const inp = document.getElementById('chat-input');
    inp?.addEventListener('keydown', chatKeydown);
    inp?.addEventListener('input', function(){ autoResize(this); });
  });

  initPage('AI Chat').then(user => { if (user) initChat(); });
</script>
</body>
</html>
