<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="StudyAI — Offline"/>
  <title>StudyAI — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#080b14;color:#e8eaf6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
    .container{max-width:420px}
    .icon{font-size:5rem;margin-bottom:24px;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    h1{font-size:1.8rem;font-weight:800;margin-bottom:12px;background:linear-gradient(135deg,#667eea,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sub{color:#8b90b3;font-size:.95rem;line-height:1.7;margin-bottom:28px}
    .btn-primary{padding:13px 32px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(102,126,234,.35);transition:all .25s;display:inline-block;text-decoration:none;margin-bottom:12px}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(102,126,234,.45)}
    .btn-sec{padding:11px 24px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#a8aacc;font-size:.88rem;cursor:pointer;transition:all .2s;display:inline-block;text-decoration:none;margin-left:10px}
    .btn-sec:hover{background:rgba(255,255,255,.1);color:#e8eaf6}
    .feature-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;text-align:left}
    .feat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;font-size:.84rem;color:#a8aacc}
    .feat-icon{font-size:1.1rem;flex-shrink:0}
    .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;margin-right:6px;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .status{font-size:.78rem;color:#8b90b3;margin-bottom:20px}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p class="sub">StudyAI needs an internet connection for AI features.<br>But here's what you can still do:</p>

    <div class="feature-list">
      <div class="feat-item"><span class="feat-icon">📝</span>View your cached notes</div>
      <div class="feat-item"><span class="feat-icon">🃏</span>Review downloaded flashcards</div>
      <div class="feat-item"><span class="feat-icon">📋</span>See your tasks and planner</div>
      <div class="feat-item"><span class="feat-icon">⚡</span>Run the Focus timer</div>
    </div>

    <div class="status"><span class="status-dot"></span>Offline — waiting for connection</div>

    <div>
      <button class="btn-primary" id='reload-btn'>🔄 Try Again</button>
      <a class="btn-sec" href="/dashboard.html">Go to Dashboard</a>
    </div>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      document.querySelector('.status').innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#10b981;margin-right:6px"></span>Connection restored! Reloading…';
      setTimeout(() => location.reload(), 1200);
    });

    // Update status
    window.addEventListener('offline', () => {
      document.querySelector('.status').innerHTML = '<span class="status-dot"></span>Still offline…';
    });
    document.getElementById('reload-btn')?.addEventListener('click', () => location.reload());
  </script>
</body>
</html>
