<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; media-src 'self' blob:; frame-src 'none'; object-src 'none';"/>
  <meta name="description" content="Tasks, exam countdowns, calendar and daily study goals."/>
  <meta property="og:title" content="StudyAI — Study Planner"/>
  <meta property="og:description" content="Tasks, exam countdowns, calendar and daily study goals."/>
  <meta property="og:type" content="website"/>
  <meta name="theme-color" content="#667eea"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>StudyAI — Study Planner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>"/>
    <link rel="stylesheet" href="assets/css/global.css"/>
  <script src="assets/js/themes.js"></script>
  <script src="assets/js/font-controls.js"></script>
  <script src="assets/js/backgrounds.js"></script>

  <link rel="stylesheet" href="assets/css/components.css"/>
  <link rel="stylesheet" href="assets/css/mobile.css"/>
  <style>
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-wd{text-align:center;font-size:.64rem;font-weight:700;text-transform:uppercase;color:var(--text-muted);padding:6px 0}
    .cal-day{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .16s;font-size:.82rem;border:1px solid transparent;position:relative}
    .cal-day:hover{background:rgba(255,255,255,.06)}
    .cal-day.today{background:linear-gradient(135deg,rgba(102,126,234,.18),rgba(240,147,251,.1));border-color:rgba(102,126,234,.3);font-weight:700}
    .cal-day.sel{background:var(--grad-1);color:#fff;font-weight:700;box-shadow:0 4px 14px rgba(102,126,234,.4)}
    .cal-day.dim{opacity:.22;pointer-events:none}
    .cal-day.has-t::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--green)}
    .cal-day.has-e::after{background:var(--red)}
    .exam-cdown{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;margin-bottom:9px;transition:.18s}
    .exam-cdown:hover{background:var(--bg-card-hover)}
    .exam-days-big{font-family:var(--font-display);font-size:1.9rem;font-weight:800;line-height:1}
    .day-header{font-family:var(--font-display);font-weight:700;font-size:.9rem;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .fsel{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.78rem;padding:6px 11px;outline:none;cursor:pointer}
  </style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="page-body">
      <div class="page-header">
        <div class="page-header-left"><h1>📅 Study Planner</h1><p>Tasks, exams, calendar and daily goals</p></div>
        <div class="page-header-right">
          <button class="btn btn-secondary" id="btn-add-exam-open">📅 Add Exam</button>
          <button class="btn btn-primary"   id="btn-add-task-open">+ Add Task</button>
        </div>
      </div>

      <div class="grid-2" style="margin-bottom:16px">
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <button class="btn btn-secondary btn-sm" id="btn-cal-prev">←</button>
            <span id="cal-label" style="font-family:var(--font-display);font-weight:700;font-size:.95rem"></span>
            <button class="btn btn-secondary btn-sm" id="btn-cal-next">→</button>
          </div>
          <div class="cal-grid" id="cal-weekdays"></div>
          <div class="cal-grid" id="cal-grid" style="margin-top:2px"></div>
          <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
            <div class="day-header">
              <span id="day-label">Today</span>
              <button class="btn btn-secondary btn-sm" id="btn-day-add-task">+ Task</button>
            </div>
            <div id="day-tasks-list"></div>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="card" style="flex:1">
            <div class="card-header">
              <span class="card-title">📅 Exam Countdowns</span>
              <button class="btn btn-secondary btn-sm" id="btn-add-exam-small">+ Add</button>
            </div>
            <div id="exam-list"></div>
          </div>
          <div class="card">
            <div class="card-title">🎯 Daily Study Goal</div>
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
              <span class="text-sm">Today's Progress</span>
              <span id="goal-hrs-text" style="font-family:var(--font-mono);font-size:.9rem;font-weight:700">0h / 0h</span>
            </div>
            <div class="progress mb-3" style="height:10px"><div class="progress-fill progress-gradient" id="goal-bar" style="width:0%;border-radius:5px"></div></div>
            <div id="goal-pct-text" class="text-xs text-muted mb-3"></div>
            <div style="display:flex;gap:8px">
              <input id="goal-input" class="form-input" type="number" placeholder="Hours/day" min=".5" max="16" step=".5" style="flex:1"/>
              <button class="btn btn-primary btn-sm" id="btn-set-goal">Set</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">📋 All Tasks</span>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <select class="fsel" id="filter-subject"><option value="all">All Subjects</option></select>
            <select class="fsel" id="filter-status"><option value="all">All</option><option value="pending">⏳ Pending</option><option value="done">✅ Done</option></select>
            <select class="fsel" id="filter-priority"><option value="all">Any Priority</option><option value="high">🔴 High</option><option value="medium">🟡 Medium</option><option value="low">🟢 Low</option></select>
          </div>
        </div>
        <div id="all-tasks-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="modal-add-task">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">+ Add Task</span><button class="modal-close" data-close="modal-add-task">✕</button></div>
    <div class="form-group"><label class="form-label">Task Description</label><input id="t-text" class="form-input" placeholder="e.g. Study Chapter 5"/></div>
    <div class="grid-2" style="gap:10px">
      <div class="form-group"><label class="form-label">Subject</label><select id="t-subject" class="form-input"></select></div>
      <div class="form-group"><label class="form-label">Priority</label><select id="t-priority" class="form-input"><option value="high">🔴 High</option><option value="medium" selected>🟡 Medium</option><option value="low">🟢 Low</option></select></div>
    </div>
    <div class="grid-2" style="gap:10px">
      <div class="form-group"><label class="form-label">Due Date</label><input id="t-date" class="form-input" type="date"/></div>
      <div class="form-group"><label class="form-label">Duration (hrs)</label><input id="t-duration" class="form-input" type="number" value="1" min=".5" max="8" step=".5"/></div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-save-task">Add Task</button>
  </div>
</div>

<!-- Add Exam Modal -->
<div class="modal-overlay" id="modal-add-exam">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">📅 Add Exam</span><button class="modal-close" data-close="modal-add-exam">✕</button></div>
    <div class="form-group"><label class="form-label">Subject / Paper</label><input id="e-subject" class="form-input" placeholder="e.g. Operating Systems Midterm"/></div>
    <div class="grid-2" style="gap:10px">
      <div class="form-group"><label class="form-label">Exam Date</label><input id="e-date" class="form-input" type="date"/></div>
      <div class="form-group"><label class="form-label">Type</label><select id="e-type" class="form-input"><option>Midterm</option><option>Final</option><option>Quiz</option><option>Practical</option><option>Assignment</option></select></div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-save-exam">Add Exam</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="assets/js/subjects.js"></script>
<script src="assets/js/skeletons.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/planner.js"></script>
<script src="assets/js/events.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const d = new Date(); document.getElementById('t-date').value = d.toISOString().split('T')[0];
    const ed = new Date(); ed.setDate(ed.getDate()+14); document.getElementById('e-date').value = ed.toISOString().split('T')[0];

    document.getElementById('btn-add-task-open')?.addEventListener('click', () => openModal('modal-add-task'));
    document.getElementById('btn-add-exam-open')?.addEventListener('click', () => openModal('modal-add-exam'));
    document.getElementById('btn-add-exam-small')?.addEventListener('click', () => openModal('modal-add-exam'));
    document.getElementById('btn-day-add-task')?.addEventListener('click', () => openModal('modal-add-task'));
    document.getElementById('btn-save-task')?.addEventListener('click', addTask);
    document.getElementById('btn-save-exam')?.addEventListener('click', addExam);
    document.getElementById('btn-set-goal')?.addEventListener('click', setGoal);
    document.getElementById('btn-cal-prev')?.addEventListener('click', () => calNav(-1));
    document.getElementById('btn-cal-next')?.addEventListener('click', () => calNav(1));
    document.getElementById('filter-subject')?.addEventListener('change', renderAllTasks);
    document.getElementById('filter-status')?.addEventListener('change', renderAllTasks);
    document.getElementById('filter-priority')?.addEventListener('change', renderAllTasks);

    populateSubjectSelect(document.getElementById('t-subject'));
    populateSubjectSelect(document.getElementById('filter-subject'), true);
  });
  initPage('Study Planner').then(user => { if (user) initPlanner(); });
</script>
</body>
</html>
